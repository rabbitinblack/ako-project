<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>บัตรเลข / さんすうカード</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232563eb'/%3E%3Cpath d='M20 32h24M32 20v24' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&family=Mali:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section id="home-screen" class="home-screen" aria-labelledby="home-title">
        <h1 id="home-title">
          <span>เลือกบัตรเลข</span>
          <span lang="ja">カードをえらぶ</span>
        </h1>
        <div class="deck-options">
          <button class="deck-card" type="button" data-deck="additionLevel1">
            <span>บัตรบวกเลขระดับ 1</span>
            <span lang="ja">たし算カード レベル1</span>
          </button>
          <button class="deck-card" type="button" data-deck="subtractionLevel1">
            <span>บัตรลบเลขระดับ 1</span>
            <span lang="ja">ひき算カード レベル1</span>
          </button>
          <button class="deck-card" type="button" data-deck="additionLevel2">
            <span>บัตรบวกเลขระดับ 2</span>
            <span lang="ja">たし算カード レベル2</span>
          </button>
          <button class="deck-card" type="button" data-deck="subtractionLevel2">
            <span>บัตรลบเลขระดับ 2</span>
            <span lang="ja">ひき算カード レベル2</span>
          </button>
        </div>
      </section>

      <section id="practice-screen" aria-labelledby="app-title" hidden>
        <header class="topbar">
          <div>
            <h1 id="app-title">
              <span>บัตรบวกเลข</span>
              <span lang="ja">たし算カード</span>
            </h1>
            <p id="progress" class="progress">ใบที่ 1 / 64 · 1 / 64 枚</p>
          </div>
          <div class="mode-switch" aria-label="เลือกรูปแบบโจทย์ / 問題の並び方">
            <button id="ordered-mode" class="mode is-active" type="button" aria-pressed="true">
              <span>เรียง</span>
              <span lang="ja">順番</span>
            </button>
            <button id="random-mode" class="mode" type="button" aria-pressed="false">
              <span>สุ่ม</span>
              <span lang="ja">ランダム</span>
            </button>
          </div>
        </header>

        <section class="stage" aria-live="polite">
          <button id="flash-card" class="flash-card" type="button" aria-label="เปิดคำตอบ / 答えを見る">
            <span class="face face-front">
              <span id="question" class="formula">0 + 0</span>
            </span>
            <span class="face face-back">
              <span id="answer" class="answer">0</span>
            </span>
          </button>
        </section>

        <nav class="controls" aria-label="ควบคุมบัตร / カード操作">
          <button id="prev-card" type="button">
            <span>ก่อนหน้า</span>
            <span lang="ja">前へ</span>
          </button>
          <button id="next-card" type="button">
            <span>ถัดไป</span>
            <span lang="ja">次へ</span>
          </button>
        </nav>
        <button id="home-button" class="home-button" type="button">
          <span>กลับหน้าแรก</span>
          <span lang="ja">ホームへ</span>
        </button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
